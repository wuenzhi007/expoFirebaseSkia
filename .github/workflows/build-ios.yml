name: Build iOS IPA

on:
  push:
    branches: [ main-temp ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: ubuntu-latest
    env:
      EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm install
    - name: Login to EAS
      run: npx eas login --token $EAS_TOKEN
    - name: Build iOS IPA on EAS
      run: npx eas build --platform ios --profile production --non-interactive
