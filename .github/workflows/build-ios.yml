name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Login to EAS
      run: npx eas login --access-token ${{ secrets.EXPO_TOKEN }}
    - name: Build iOS IPA locally
      run: npx eas build --platform ios --profile production --local --non-interactive