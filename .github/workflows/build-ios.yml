name: Build iOS Development

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    - name: Setup Expo CLI
      run: npm install -g @expo/cli
    - name: Install dependencies
      run: npm ci
    - name: Prebuild iOS
      run: npx expo prebuild --platform ios --no-install
    - name: Install CocoaPods
      run: cd ios && pod install
    - name: Build iOS app
      run: |
        cd ios
        xcodebuild -workspace expoFirebaseSkia.xcworkspace -scheme expoFirebaseSkia -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' build