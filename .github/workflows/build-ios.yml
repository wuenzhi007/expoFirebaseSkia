name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm install
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
    - name: Install CocoaPods
      run: gem install cocoapods
    - name: Prebuild iOS
      run: npx expo prebuild --platform ios --clean
    - name: Install CocoaPods dependencies
      run: cd ios && pod install
    - name: Build iOS app
      run: |
        cd ios
        xcodebuild -workspace expoFirebaseSkia.xcworkspace -scheme expoFirebaseSkia -configuration Release -sdk iphoneos -archivePath build/expoFirebaseSkia.xcarchive archive
